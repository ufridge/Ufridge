<!DOCTYPE html>

  <meta name="theme-color" content="#4DB6E2">
  <style>
    .not-found-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 60vh;
      padding: 2rem 1rem;
    }
    .not-found-code {
      font-size: 6rem;
      font-weight: 800;
      color: #4DB6E2;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .not-found-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0077cc;
      margin-bottom: 0.75rem;
    }
    .not-found-desc {
      color: var(--muted-color, #666);
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .not-found-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background-color: #4DB6E2;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .not-found-btn:hover {
      background-color: #3CA4D0;
      color: white;
    }
    @media (prefers-color-scheme: dark) {
      .not-found-title { color: #4DB6E2; }
    }
  </style>
</head>
